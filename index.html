<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>豆豆图纸 · 拼豆图案生成器</title>
<style>
/* ====================================================================
 * 全局 — 黑色背景让图纸更突出
 * ==================================================================== */
:root {
  --coral: #FF6B4A; --coral-dark: #E55A3A;
  --dark: #1A1A1A; --gray: #999; --white: #FFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:#1C1C1E;color:var(--white);min-height:100vh;
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;align-items:center;
}

/* ====================================================================
 * 顶部工具栏（极简）
 * ==================================================================== */
.toolbar{
  width:100%;max-width:700px;display:flex;align-items:center;gap:12px;
  padding:12px 16px;position:sticky;top:0;z-index:10;
  background:rgba(28,28,30,0.92);backdrop-filter:blur(12px);
}
.toolbar-title{font-size:18px;font-weight:700;flex:1}
.toolbar-actions{display:flex;gap:6px}
.tb-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:rgba(255,255,255,0.1);color:var(--white);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.tb-btn:hover{background:rgba(255,255,255,0.18)}
.tb-btn.active{background:var(--coral)}

/* ====================================================================
 * 主画布区 — 占满整屏
 * ==================================================================== */
.canvas-stage{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:8px;width:100%;max-width:700px;
}
.canvas-stage canvas{
  display:block;max-width:100%;max-height:calc(100vh - 200px);
  border-radius:6px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.06),0 8px 32px rgba(0,0,0,0.5);
  image-rendering:pixelated; /* 像素风格 */
}

/* ====================================================================
 * 空状态 — 上传引导
 * ==================================================================== */
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:40px;
  text-align:center;max-width:400px;
}
.empty-icon{font-size:64px;margin-bottom:8px}
.empty-title{font-size:24px;font-weight:700}
.empty-desc{font-size:14px;color:var(--gray);line-height:1.6}
.upload-btn{
  display:flex;align-items:center;gap:8px;padding:14px 32px;
  border-radius:14px;border:none;background:var(--coral);color:var(--white);
  font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;
  transition:all 0.15s;
}
.upload-btn:hover{background:var(--coral-dark);transform:translateY(-1px)}
.upload-btn:active{transform:scale(0.97)}

/* 拖拽区 */
.drop-zone{
  border:2px dashed rgba(255,255,255,0.2);border-radius:16px;
  padding:40px 24px;text-align:center;cursor:pointer;transition:all 0.2s;
  width:100%;max-width:360px;
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--coral);background:rgba(255,107,74,0.06)}
.drop-zone img{max-width:100%;max-height:200px;border-radius:10px;display:block;margin:0 auto}

/* ====================================================================
 * 底部统计条（紧凑横向条形图）
 * ==================================================================== */
.stats-strip{
  width:100%;max-width:700px;padding:10px 16px;
  display:flex;gap:4px;flex-wrap:wrap;justify-content:center;
  background:rgba(28,28,30,0.92);backdrop-filter:blur(12px);
  position:sticky;bottom:0;
}
.stat-chip{
  display:flex;align-items:center;gap:5px;padding:6px 10px;
  border-radius:8px;background:rgba(255,255,255,0.06);
  font-size:11px;cursor:default;white-space:nowrap;
}
.stat-chip .dot{
  width:10px;height:10px;border-radius:3px;flex-shrink:0;
}
.stat-chip .count{font-weight:700;color:var(--coral);margin-left:2px}

/* ====================================================================
 * 底部参数栏
 * ==================================================================== */
.param-strip{
  width:100%;max-width:700px;display:flex;align-items:center;
  gap:6px;padding:10px 16px;
  border-top:1px solid rgba(255,255,255,0.06);
  background:rgba(28,28,30,0.92);
}
.param-strip select,.param-strip input{
  padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);color:var(--white);font-size:13px;
  outline:none;text-align:center;
}
.param-strip select{min-width:90px}
.param-strip input{width:60px}
.param-strip .spacer{flex:1}
.param-strip .act-btn{
  padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.15s;color:var(--white);
}
.act-btn.primary{background:var(--coral)}
.act-btn.primary:hover{background:var(--coral-dark)}
.act-btn.secondary{background:rgba(255,255,255,0.1)}
.act-btn.secondary:hover{background:rgba(255,255,255,0.18)}
.act-btn:disabled{opacity:0.35;cursor:not-allowed}
.act-btn:active{transform:scale(0.96)}

/* ====================================================================
 * 下载弹窗
 * ==================================================================== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;
  display:flex;align-items:center;justify-content:center;
}
.modal{
  background:#2C2C2E;border-radius:20px;padding:28px 24px;
  max-width:340px;width:90%;text-align:center;
}
.modal h3{font-size:18px;margin-bottom:8px}
.modal p{font-size:14px;color:var(--gray);margin-bottom:20px;line-height:1.5}
.modal .preview{max-width:100%;border-radius:10px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
.modal .btns{display:flex;gap:10px}
.modal .btns button{
  flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;
  font-weight:600;cursor:pointer;transition:all 0.15s;
}
.modal .btns .btn-save{background:var(--coral);color:var(--white)}
.modal .btns .btn-save:hover{background:var(--coral-dark)}
.modal .btns .btn-cancel{background:rgba(255,255,255,0.1);color:var(--white)}
.modal .btns .btn-cancel:hover{background:rgba(255,255,255,0.18)}

/* ====================================================================
 * Toast
 * ==================================================================== */
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  padding:10px 22px;background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);color:var(--white);border-radius:20px;
  font-size:13px;z-index:200;pointer-events:none;
  opacity:0;transition:opacity 0.3s;
}
.toast.show{opacity:1}

.hidden{display:none!important}
#fileInput,#cameraInput{display:none}
</style>
</head>
<body>

<!-- 顶部工具栏 -->
<div class="toolbar">
  <span class="toolbar-title">🧶 豆豆图纸</span>
  <div class="toolbar-actions">
    <button class="tb-btn" id="btnUpload" title="上传图片">📷</button>
    <button class="tb-btn" id="btnCamera" title="拍照">📸</button>
    <button class="tb-btn" id="btnGrid29" data-size="29">29</button>
    <button class="tb-btn active" id="btnGrid58" data-size="58">58</button>
    <button class="tb-btn" id="btnGrid72" data-size="72">72</button>
    <button class="tb-btn" id="btnPalette" title="切换色板">🎨</button>
    <button class="tb-btn" id="btnSave" title="保存图片" disabled>💾</button>
  </div>
</div>

<!-- 空状态 -->
<div class="empty-state" id="emptyState">
  <span class="empty-icon">🧩</span>
  <span class="empty-title">生成你的拼豆图纸</span>
  <span class="empty-desc">上传一张照片，自动匹配最接近的拼豆颜色，生成带编号的网格图纸</span>
  <div class="drop-zone" id="dropZone">
    <span style="font-size:36px;display:block;margin-bottom:8px">📁</span>
    <span style="font-size:14px;color:var(--gray)">点击或拖拽图片到此处<br><strong style="color:var(--coral)">JPG / PNG / WebP</strong></span>
    <img id="previewThumb" style="display:none">
  </div>
  <button class="upload-btn" id="btnStartUpload">📷 选择图片</button>
</div>

<!-- 图纸画布 -->
<div class="canvas-stage hidden" id="canvasStage">
  <canvas id="mainCanvas"></canvas>
</div>

<!-- 底部统计 -->
<div class="stats-strip hidden" id="statsStrip"></div>

<!-- 底部参数 -->
<div class="param-strip">
  <span style="font-size:12px;color:var(--gray);white-space:nowrap">网格</span>
  <select id="gridSelect">
    <option value="29">29×29</option>
    <option value="49">49×49</option>
    <option value="58" selected>58×58</option>
    <option value="72">72×72</option>
    <option value="custom">自定义</option>
  </select>
  <input type="number" id="customGridInput" value="40" min="10" max="120" disabled placeholder="N">
  <span style="font-size:12px;color:var(--gray);white-space:nowrap;margin-left:4px">色板</span>
  <select id="paletteSelect">
    <option value="full">全色板100色</option>
    <option value="perler">Perler 55色</option>
  </select>
  <span class="spacer"></span>
  <button class="act-btn secondary" id="btnRegenerate" disabled>🔄 重新生成</button>
</div>

<input type="file" id="fileInput" accept="image/*">
<input type="file" id="cameraInput" accept="image/*" capture="environment">

<!-- 下载弹窗 -->
<div class="modal-overlay hidden" id="saveModal">
  <div class="modal">
    <h3>💾 保存图纸</h3>
    <p id="saveInfo"></p>
    <canvas id="savePreview" class="preview" style="max-width:100%;border-radius:10px"></canvas>
    <div class="btns">
      <button class="btn-cancel" id="btnCancelSave">关闭</button>
      <button class="btn-save" id="btnConfirmSave">保存到相册</button>
    </div>
    <p style="font-size:11px;color:var(--gray);margin-top:10px">💡 也可以点「查看大图」长按保存</p>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// CIE Lab 转换 + 匹配

function rgbToLab(r,g,b){
  let rr=r/255,gg=g/255,bb=b/255;
  const gama=c=>c>0.04045?((c+0.055)/1.055)**2.4:c/12.92;
  rr=gama(rr);gg=gama(gg);bb=gama(bb);
  const x=rr*0.4124564+gg*0.3575761+bb*0.1804375;
  const y=rr*0.2126729+gg*0.7151522+bb*0.0721750;
  const z=rr*0.0193339+gg*0.1191920+bb*0.9503041;
  const f=t=>t>0.008856?t**(1/3):(903.3*t+16)/116;
  const fy=f(y/1.0);
  return{L:116*fy-16,a:500*(f(x/0.95047)-fy),b:200*(fy-f(z/1.08883))};
}
function deltaE(l1,l2){const dL=l1.L-l2.L,da=l1.a-l2.a,db=l1.b-l2.b;return Math.sqrt(dL*dL+da*da+db*db);}
function findClosest(r,g,b,pal){
  const t=rgbToLab(r,g,b);let best=null,bestDE=Infinity;
  for(const c of pal){
    const de=deltaE(t,{L:c.lab[0],a:c.lab[1],b:c.lab[2]});
    if(de<bestDE){bestDE=de;best=c;}if(de<0.05)break;
  }
  return{...best,deltaE:Math.round(bestDE*100)/100};
}

// ============================================================================
// 像素化 + 量化
// ============================================================================
function quantizeImage(img,gridSize,palette){
  const tiny=document.createElement('canvas');
  tiny.width=gridSize;tiny.height=gridSize;
  const ctx=tiny.getContext('2d');
  const src=Math.min(img.naturalWidth,img.naturalHeight);
  const sx=(img.naturalWidth-src)/2,sy=(img.naturalHeight-src)/2;
  ctx.drawImage(img,sx,sy,src,src,0,0,gridSize,gridSize);
  const imgData=ctx.getImageData(0,0,gridSize,gridSize);
  const px=imgData.data;
  const grid=[];
  for(let row=0;row<gridSize;row++){
    grid[row]=[];
    for(let col=0;col<gridSize;col++){
      const i=(row*gridSize+col)*4;
      grid[row][col]=findClosest(px[i],px[i+1],px[i+2],palette);
    }
  }
  return grid;
}

// ============================================================================
// Canvas 绘制 — 大画布，像素风格
// ============================================================================
function drawGrid(canvas,grid,gridSize,displaySize){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=displaySize*dpr;canvas.height=displaySize*dpr;
  canvas.style.width=displaySize+'px';canvas.style.height=displaySize+'px';
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const cs=displaySize/gridSize;
  const showText=cs>=6.5;

  // 白底
  ctx.fillStyle='#FFF';ctx.fillRect(0,0,displaySize,displaySize);

  // 逐格
  for(let row=0;row<gridSize;row++){
    for(let col=0;col<gridSize;col++){
      const c=grid[row][col];const[r,g,b]=c.rgb;
      const x=col*cs,y=row*cs;
      ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(x,y,cs,cs);
      if(showText){
        const fs=Math.max(3.2,Math.min(cs*0.38,12));
        ctx.font=`${fs}px -apple-system,"PingFang SC",sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle=(0.2126*r+0.7152*g+0.0722*b)>140?'#333':'#FFF';
        ctx.fillText(c.id,x+cs/2,y+cs/2);
      }
    }
  }

  // 网格线（极细）
  ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=0.4;
  for(let i=0;i<=gridSize;i++){
    const p=i*cs;
    ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,displaySize);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(displaySize,p);ctx.stroke();
  }

  // 外框
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
  ctx.strokeRect(0.5,0.5,displaySize-1,displaySize-1);
}

// ============================================================================
// 统计
// ============================================================================
function countColors(grid){
  const total=grid.length*grid[0].length;
  const map=new Map();
  for(const row of grid)for(const c of row){
    const e=map.get(c.id);if(e)e.count++;else map.set(c.id,{id:c.id,name:c.name,count:1,rgb:c.rgb});
  }
  return Array.from(map.values()).map(i=>({...i,pct:((i.count/total)*100).toFixed(1)+'%'})).sort((a,b)=>b.count-a.count);
}

// ============================================================================
// UI 状态
// ============================================================================
const $=id=>document.getElementById(id);
let uploadedImage=null,currentGrid=null,currentStats=null;
let gridSize=58,palette=FULL_PALETTE,_blobUrl=null;
let gridButtons=[$('btnGrid29'),$('btnGrid58'),$('btnGrid72')];

function toast(msg){
  const el=$('toast');clearTimeout(el._t);
  el.textContent=msg;el.classList.add('show');
  el._t=setTimeout(()=>el.classList.remove('show'),2000);
}

// ---- 上传 ----
$('btnUpload').addEventListener('click',()=>$('fileInput').click());
$('btnCamera').addEventListener('click',()=>$('cameraInput').click());
$('btnStartUpload').addEventListener('click',()=>$('fileInput').click());
$('dropZone').addEventListener('click',()=>$('fileInput').click());
$('fileInput').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
$('cameraInput').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});

// 拖拽
const dz=$('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});

function loadFile(file){
  if(!file.type.match(/image\/(jpeg|png|webp|bmp|gif)/)){toast('请选择图片文件');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      uploadedImage=img;
      const thumb=$('previewThumb');
      thumb.src=ev.target.result;thumb.style.display='block';
      dz.querySelector('span:first-child').style.display='none';
      dz.querySelector('span:last-child').style.display='none';
      toast('图片已加载 ✓ 点击🔄或切换网格尺寸生成');
      $('btnRegenerate').disabled=false;
      generatePattern(); // 自动生成
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ---- 网格尺寸 ----
function updateGridUI(){
  gridButtons.forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector(`.tb-btn[data-size="${gridSize}"]`);
  if(btn)btn.classList.add('active');
  $('gridSelect').value=gridButtons.some(b=>b.classList.contains('active'))?String(gridSize):'custom';
  if(String(gridSize)==='custom'||![29,49,58,72].includes(gridSize))$('customGridInput').disabled=false;
  else $('customGridInput').disabled=true;
}

gridButtons.forEach(b=>b.addEventListener('click',()=>{
  gridSize=parseInt(b.dataset.size);
  updateGridUI();
  if(uploadedImage)generatePattern();
}));

$('gridSelect').addEventListener('change',function(){
  if(this.value==='custom'){$('customGridInput').disabled=false;$('customGridInput').focus();}
  else{gridSize=parseInt(this.value);updateGridUI();if(uploadedImage)generatePattern();}
});

$('customGridInput').addEventListener('input',function(){
  const v=parseInt(this.value)||40;gridSize=Math.max(10,Math.min(120,v));
});
$('customGridInput').addEventListener('change',function(){
  if(uploadedImage)generatePattern();
});

// ---- 色板 ----
$('paletteSelect').addEventListener('change',function(){
  palette=this.value==='full'?FULL_PALETTE:PERLER_PALETTE;
  toast('色板：'+this.options[this.selectedIndex].text);
  if(uploadedImage)generatePattern();
});
$('btnPalette').addEventListener('click',()=>{
  // 快速切换
  palette=palette===FULL_PALETTE?PERLER_PALETTE:FULL_PALETTE;
  $('paletteSelect').value=palette===FULL_PALETTE?'full':'perler';
  toast(palette===FULL_PALETTE?'全色板 100色':'Perler 55色');
  if(uploadedImage)generatePattern();
});

// ---- 生成 ----
function generatePattern(){
  if(!uploadedImage)return;
  if($('customGridInput').disabled===false){
    const v=parseInt($('customGridInput').value)||40;
    gridSize=Math.max(10,Math.min(120,v));
  }

  $('btnRegenerate').disabled=true;
  $('btnRegenerate').textContent='⏳ 生成中...';

  requestAnimationFrame(()=>{
    try{
      currentGrid=quantizeImage(uploadedImage,gridSize,palette);
      currentStats=countColors(currentGrid);

      // 画布：宽度填满，最大 680px
      const maxW=Math.min(680,window.innerWidth-16);
      drawGrid($('mainCanvas'),currentGrid,gridSize,maxW);

      // 切换视图
      $('emptyState').classList.add('hidden');
      $('canvasStage').classList.remove('hidden');
      $('statsStrip').classList.remove('hidden');
      $('btnSave').disabled=false;

      // 底部统计条
      renderStats(currentStats);

      // URL
      if(_blobUrl){URL.revokeObjectURL(_blobUrl);_blobUrl=null;}

      toast(`✅ ${gridSize}×${gridSize} · ${currentStats.length}色 · ${gridSize*gridSize}颗`);
    }catch(err){
      console.error(err);toast('生成失败');
    }finally{
      $('btnRegenerate').disabled=false;
      $('btnRegenerate').textContent='🔄 重新生成';
    }
  });
}

$('btnRegenerate').addEventListener('click',generatePattern);

function renderStats(stats){
  const strip=$('statsStrip');
  strip.innerHTML=stats.map(s=>`
    <span class="stat-chip">
      <span class="dot" style="background:rgb(${s.rgb[0]},${s.rgb[1]},${s.rgb[2]})"></span>
      ${s.id} ${s.name} <span class="count">${s.count}</span>
    </span>
  `).join('');
}

// ---- 保存（生成大图 → 弹窗 → 下载/长按） ----
function generateHiResBlob(){
  return new Promise((resolve,reject)=>{
    if(!currentGrid)return reject('无数据');
    const size=gridSize*50;
    const cvs=document.createElement('canvas');
    drawGrid(cvs,currentGrid,gridSize,size);
    cvs.toBlob(b=>b?resolve(b):reject('导出失败'),'image/png',1);
  });
}

$('btnSave').addEventListener('click',async()=>{
  if(!currentGrid)return toast('先生成图纸');
  $('btnSave').disabled=true;$('btnSave').textContent='⏳';

  try{
    const blob=await generateHiResBlob();
    _blobUrl=URL.createObjectURL(blob);

    // 弹窗预览 + 选项
    $('saveInfo').textContent=`${gridSize}×${gridSize} · ${currentStats.length}色 · ${gridSize*gridSize}颗`;
    const previewCvs=$('savePreview');
    previewCvs.style.display='block';
    previewCvs.style.maxWidth='100%';
    const previewSize=Math.min(280,gridSize*5);
    drawGrid(previewCvs,currentGrid,gridSize,previewSize);

    $('saveModal').classList.remove('hidden');
    $('btnSave').textContent='💾';
    $('btnSave').disabled=false;
  }catch(err){
    toast('生成失败');$('btnSave').disabled=false;$('btnSave').textContent='💾';
  }
});

$('btnCancelSave').addEventListener('click',()=>$('saveModal').classList.add('hidden'));
$('saveModal').addEventListener('click',e=>{if(e.target===$('saveModal'))$('saveModal').classList.add('hidden');});

$('btnConfirmSave').addEventListener('click',()=>{
  if(!_blobUrl)return;
  const a=document.createElement('a');
  a.href=_blobUrl;a.download=`豆豆图纸_${gridSize}x${gridSize}.png`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  $('saveModal').classList.add('hidden');
  toast('✅ 下载完成');

  // 如果是移动端，额外打开新窗口让用户长按保存
  if(/Mobi|Android/i.test(navigator.userAgent)){
    setTimeout(()=>window.open(_blobUrl,'_blank'),500);
  }
});

// ============================================================================
// 初始
// ============================================================================
updateGridUI();
console.log('🧶 豆豆图纸 · 拼豆图案生成器');
console.log(`   色板 ${FULL_PALETTE.length} 色 | 网格 29/49/58/72/自定义`);
console.log('   拖拽或点击上传图片即可开始 →');
</script>
</body>
</html>
